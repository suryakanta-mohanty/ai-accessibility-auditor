spring.application.name=backend

# PostgreSQL Database configuration

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_accessibility_auditor}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Kanhu12*}

# JPA / Hibernate

